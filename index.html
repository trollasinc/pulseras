<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>✨Puesto de Pulseras✨</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="navbar">✨Puesto de Pulseras✨</div>

    <div id="products"></div>

    <div id="modal" style="display: none">
      <h3>Reservar</h3>
      <p>*¿Cuál es tu nombre?</p>
      <input class="input_reserva" id="r_name" placeholder="Nombre" />
      <p>*¿Cuál es tu apellido?</p>
      <input class="input_reserva" id="r_lastname" placeholder="Apellidos" />
      <p>¿Cuál es tu teléfono?</p>
      <input
        class="input_reserva"
        id="r_phone"
        placeholder="Teléfono (Opcional)" />
      <p>¿Cuál es tu correo electrónico?</p>
      <input
        class="input_reserva"
        id="r_email"
        placeholder="Correo (Opcional)" />
      <p>*¿Cuál es el número de tu parcela?</p>
      <input
        class="input_reserva"
        id="r_parcel"
        placeholder="Número de parcela" />
      <p>*¿Cuándo vas a estar disponible en tu parcela?</p>
      <input class="input_reserva" id="r_datetime" type="datetime-local" />
      <button id="send">Enviar Reserva</button>
      <button id="close">Cerrar</button>
    </div>

    <script type="module" src="js/index.js"></script>
  </body>
</html>
